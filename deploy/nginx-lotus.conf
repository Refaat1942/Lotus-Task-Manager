# Optional: access Lotus Task Manager on port 80 (no :5000 in URL)
# Run on VPS after: apt install nginx -y

server {
    listen 80;
    server_name 187.124.15.14;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Install:
#   sudo cp deploy/nginx-lotus.conf /etc/nginx/sites-available/lotus-taskmanager
#   sudo ln -sf /etc/nginx/sites-available/lotus-taskmanager /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then open: http://187.124.15.14/login
