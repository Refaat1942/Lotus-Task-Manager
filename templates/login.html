<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ t['dir'] }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t['login_title'] }} | Lotus CRM</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: {{ t['font'] }};
            /* التعديل هنا: استخدام url_for لاستدعاء الصورة من مجلد المشروع بشكل صحيح */
            background-image: url('{{ url_for("static", filename="images/image.jpeg") }}'); 
            
            background-size: cover; 
            background-position: top center; 
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            transition: transform 0.3s ease;
            backdrop-filter: blur(5px); 
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .logo-img {
            width: 150px; 
            height: auto;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .form-control {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            height: auto;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #2c3e50;
            box-shadow: 0 0 0 4px rgba(44, 62, 80, 0.1);
        }

        .btn-primary {
            background-color: #2c3e50;
            border-color: #2c3e50;
            border-radius: 12px;
            padding: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #34495e;
            transform: scale(1.02);
        }

        .lang-switch {
            margin-top: 25px;
            display: inline-block;
        }

        .lang-switch a {
            color: #6c757d;
            text-decoration: none;
            font-weight: 600;
            padding: 5px 15px;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .lang-switch a:hover {
            background-color: #2c3e50;
            color: #fff;
            border-color: #2c3e50;
        }
        
        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #adb5bd;
        }

        .text-start-dynamic {
            text-align: {{ 'right' if lang == 'ar' else 'left' }};
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card">
            <div class="text-center">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Lotus Logo" class="logo-img">
                
                <h4 class="fw-bold text-dark mb-1">{{ t['login_title'] }}</h4>
                <p class="text-muted mb-4">{{ t['login_subtitle'] }}</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} py-2 fs-6 mb-3 rounded-3">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="text-start-dynamic">
                    <label class="form-label fw-bold small text-secondary ms-1">{{ t['username'] }}</label>
                    <div class="input-group">
                        <input type="text" name="username" class="form-control" required>
                    </div>
                </div>

                <div class="text-start-dynamic">
                    <label class="form-label fw-bold small text-secondary ms-1">{{ t['password'] }}</label>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-2">
                    {{ t['login_btn'] }} 
                    <i class="fas fa-arrow-{{ 'left' if lang == 'ar' else 'right' }} ms-2"></i>
                </button>
            </form>

            <div class="lang-switch">
                <a href="{{ url_for('set_language', lang_code='en' if lang=='ar' else 'ar') }}">
                    <i class="fas fa-globe me-1"></i> {{ t['lang_name'] }}
                </a>
            </div>

            <div class="footer-text">{{ t['copyright'] }}</div>
        </div>
    </div>

</body>
</html>
