{% extends "layout.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/confirmDate/confirmDate.css">

<style>
    .flatpickr-confirm {
        display: flex !important;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        width: calc(100% - 16px) !important;
        margin: 8px !important;
        padding: 0.65rem 1rem !important;
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%) !important;
        color: #fff !important;
        font-weight: 700 !important;
        font-size: 1rem !important;
        border: none !important;
        border-radius: 8px !important;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .flatpickr-confirm:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.45);
    }
    .flatpickr-calendar.hasTime .flatpickr-time {
        border-top: 1px solid #e2e8f0;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-9">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white p-4">
                <h4 class="mb-0"><i class="fas fa-tasks"></i> {{ t['new_task'] }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data" action="/tasks/create">
                    
                    <h5 class="text-secondary mb-3 border-bottom pb-2">🎯 {{ t['task_details_title'] }}</h5>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ t['task_title'] }} <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">{{ t['assign_to'] }} <span class="text-danger">*</span></label>
                            <select name="assigned_to" class="form-select border-primary" required>
                                <option value="" disabled selected>{{ t['select_emp'] }}</option>
                                {% for user in users %}
                                    {% if user.id != current_user.id %}
                                    <option value="{{ user.id }}">{{ user.full_name }} - {{ user.role }}</option>
                                    {% endif %}
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-primary"><i class="fas fa-clock"></i> {{ t['deadline'] }}</label>
                            <input type="text" id="deadlinePicker" class="form-control border-primary" placeholder="{{ t['select_datetime'] }}" readonly autocomplete="off">
                            <input type="hidden" name="deadline" id="deadlineHidden">
                            <small class="text-muted d-block mt-1"><i class="fas fa-info-circle"></i> {{ t['confirm_datetime'] }}</small>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">{{ t['priority'] }}</label>
                            <select name="priority" class="form-select">
                                <option value="Low">{{ t['priority_low'] }}</option>
                                <option value="Medium" selected>{{ t['priority_medium'] }}</option>
                                <option value="High">{{ t['priority_high'] }}</option>
                                <option value="Urgent" class="text-danger fw-bold">{{ t['priority_urgent'] }}</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label fw-bold text-success"><i class="fas fa-redo"></i> {{ t['recurrence'] }}</label>
                            <select name="recurrence" class="form-select border-success">
                                <option value="None">{{ t['rec_none'] }}</option>
                                <option value="Daily">{{ t['rec_daily'] }}</option>
                                <option value="Weekly">{{ t['rec_weekly'] }}</option>
                                <option value="Monthly">{{ t['rec_monthly'] }}</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold"><i class="fas fa-paperclip"></i> {{ t['attachment'] }}</label>
                            <input type="file" name="attachment" class="form-control">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">{{ t['description'] }} <span class="text-danger">*</span></label>
                        <textarea name="description" class="form-control" rows="5" required></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold"><i class="fas fa-paper-plane"></i> {{ t['create_btn'] }}</button>
                        <a href="/tasks" class="btn btn-light btn-lg">{{ t['cancel'] }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/confirmDate/confirmDate.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const lang = "{{ lang }}";
    const okLabel = lang === 'ar' ? 'موافق' : 'OK';
    const hiddenInput = document.getElementById('deadlineHidden');

    function syncDeadlineHidden(selectedDates) {
        if (!selectedDates || !selectedDates.length) {
            hiddenInput.value = '';
            return;
        }
        const d = selectedDates[0];
        const pad = n => String(n).padStart(2, '0');
        hiddenInput.value =
            d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
            'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    flatpickr("#deadlinePicker", {
        enableTime: true,
        time_24hr: true,
        dateFormat: "Y-m-d H:i",
        minDate: "today",
        allowInput: false,
        disableMobile: true,
        closeOnSelect: false,
        plugins: [new confirmDatePlugin({
            confirmIcon: "<i class='fas fa-check'></i>",
            confirmText: okLabel + " ",
            showAlways: true,
            theme: "light"
        })],
        onClose: function(selectedDates) {
            syncDeadlineHidden(selectedDates);
        },
        onReady: function(selectedDates, _dateStr, instance) {
            instance.calendarContainer.classList.add('ltm-deadline-picker');
        }
    });
});
</script>
{% endblock %}
