{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header ltm-header-blue text-white fw-bold">
                <i class="fas fa-cog me-2"></i> {{ t['settings_title'] }}
            </div>
            <div class="card-body p-4">
                <p class="text-muted">{{ t['settings_desc'] }}</p>
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">{{ t['auto_cancel_minutes'] }}</label>
                        <input type="number" name="auto_cancel_minutes" class="form-control form-control-lg" min="1" max="1440" value="{{ auto_cancel_minutes }}" required>
                        <div class="form-text">{{ t['auto_cancel_help'] }}</div>
                    </div>
                    <button type="submit" class="btn btn-primary fw-bold"><i class="fas fa-save me-2"></i>{{ t['save'] }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
